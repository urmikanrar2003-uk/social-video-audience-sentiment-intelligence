<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Sentiment Insights</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            width: 420px;
            min-height: 200px;
            padding: 16px;
        }

        h1 {
            font-size: 16px;
            color: #ff4444;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h1::before {
            content: "▶";
            color: #ff4444;
        }

        #output p {
            font-size: 13px;
            color: #aaa;
            margin: 6px 0;
        }

        .section {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 14px;
            margin-top: 14px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #ff4444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .metrics-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .metric {
            background: #222;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .metric-title {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .sentiment-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: capitalize;
        }

        .sentiment-positive {
            background: #1a3a1a;
            color: #4caf50;
        }

        .sentiment-neutral {
            background: #2a2a2a;
            color: #9e9e9e;
        }

        .sentiment-negative {
            background: #3a1a1a;
            color: #f44336;
        }

        .comment-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .comment-list::-webkit-scrollbar {
            width: 4px;
        }

        .comment-list::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .comment-list::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        .comment-item {
            padding: 8px 0;
            border-bottom: 1px solid #2a2a2a;
            font-size: 12px;
            line-height: 1.5;
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-sentiment {
            margin-top: 4px;
            display: block;
        }

        img {
            border-radius: 8px;
            display: block;
            width: 100%;
            margin-top: 8px;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #aaa;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #333;
            border-top-color: #ff4444;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <h1>Sentiment Insights</h1>
    <div id="output">
        <div class="loading">
            <div class="spinner"></div>
            <span>Detecting YouTube page...</span>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
